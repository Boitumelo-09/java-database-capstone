<!-- doctorDashboard.html -->

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Viewport -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Doctor Dashboard</title>

    <!-- Favicon -->
    <link rel="icon"
          type="image/png"
          th:href="@{/assets/images/logo/logo.png}" />

    <!-- Stylesheets -->
    <link rel="stylesheet"
          th:href="@{/assets/css/style.css}" />

    <link rel="stylesheet"
          th:href="@{/assets/css/adminDashboard.css}" />

    <link rel="stylesheet"
          th:href="@{/assets/css/doctorDashboard.css}" />

    <!-- Utility Scripts -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>

    <!-- Components -->
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
    <script th:src="@{/js/components/patientRows.js}" defer></script>

    <!-- Services -->
    <script type="module"
            th:src="@{/js/services/patientServices.js}"
            defer></script>

    <script type="module"
            th:src="@{/js/services/doctorDashboard.js}"
            defer></script>

</head>

<body onload="renderContent()">

<div class="container">

    <div class="wrapper">

        <!-- Dynamic Header -->
        <div id="header"></div>

        <!-- Main Content -->
        <main class="main-content">

            <h2>Doctor Dashboard</h2>

            <!-- Search -->
            <section class="search-section">

                <input
                        type="text"
                        id="searchBar"
                        class="searchBar"
                        placeholder="Search patient..." />

            </section>

            <!-- Filters -->
            <section class="filter-section">

                <button id="todayButton">
                    Today's Appointments
                </button>

                <input
                        type="date"
                        id="datePicker">

            </section>

            <!-- Patient Table -->
            <section class="table-section">

                <table id="patientTable">

                    <thead>

                    <tr>

                        <th>Patient ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Prescription</th>

                    </tr>

                    </thead>

                    <tbody id="patientTableBody">

                        <!-- Dynamic Patient Rows -->

                    </tbody>

                </table>

            </section>

        </main>

        <!-- Dynamic Footer -->
        <div id="footer"></div>

    </div>

</div>

</body>

</html>
