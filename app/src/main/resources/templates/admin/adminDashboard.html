<!-- adminDashboard.html -->

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Admin Dashboard</title>

    <!-- Favicon -->
    <link rel="icon"
          type="image/png"
          th:href="@{/assets/images/logo/logo.png}" />

    <!-- Stylesheets -->
    <link rel="stylesheet"
          th:href="@{/assets/css/style.css}">

    <link rel="stylesheet"
          th:href="@{/assets/css/adminDashboard.css}">

    <!-- Utility Scripts -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>

    <!-- Components -->
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>

</head>

<body onload="renderContent()">

<div class="container">

    <div class="wrapper">

        <!-- Dynamic Header -->
        <div id="header"></div>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Search -->
            <section class="search-section">

                <input
                        type="text"
                        id="searchBar"
                        placeholder="Search by doctor name">

            </section>

            <!-- Filters -->
            <section class="filter-section">

                <select id="timeFilter">

                    <option value="">Sort by Time</option>
                    <option value="am">AM</option>
                    <option value="pm">PM</option>

                </select>

                <select id="specialtyFilter">

                    <option value="">Filter by Specialty</option>
                    <option value="cardiologist">Cardiologist</option>
                    <option value="dentist">Dentist</option>
                    <option value="dermatologist">Dermatologist</option>
                    <option value="neurologist">Neurologist</option>
                    <option value="orthopedic">Orthopedic</option>
                    <option value="pediatrician">Pediatrician</option>
                    <option value="psychiatrist">Psychiatrist</option>
                    <option value="radiologist">Radiologist</option>
                    <option value="surgeon">Surgeon</option>

                </select>

            </section>

            <!-- Dynamic Doctor Cards -->
            <section id="content" class="doctor-container">

            </section>

        </main>

        <!-- Dynamic Footer -->
        <div id="footer"></div>

    </div>

</div>

<!-- Modal -->
<div id="modal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close">
            &times;
        </span>

        <div id="modal-body">

            <!-- Dynamic modal content -->

        </div>

    </div>

</div>

<!-- Page Scripts -->
<script type="module"
        th:src="@{/js/services/adminDashboard.js}"
        defer></script>

<script type="module"
        th:src="@{/js/components/doctorCard.js}"
        defer></script>

</body>

</html>
